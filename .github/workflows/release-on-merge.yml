name: Release version on merge to main

on:
  workflow_call:
    inputs:
      version-source:
        description: >
          How to read and write the version number.
          Supported values: package-xml, package-json, pyproject-toml.
        type: string
        required: false
        default: package-xml
      python-version:
        description: Python version used to run towncrier
        type: string
        required: false
        default: "3.12"
      fragment-directory:
        description: Directory containing news fragments
        type: string
        required: false
        default: newsfragments
    secrets:
      deploy-key:
        description: >
          SSH private key for a repo deploy key with write access. Required
          when main is protected by a ruleset that lists "Deploy keys" as a
          bypass actor, so the release commit and tag can push past the rule.
        required: true

permissions:
  contents: write

jobs:

  # ── Detect ───────────────────────────────────────────────────────
  detect:
    name: Detect version bump
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'Release ') }}
    outputs:
      fragment: ${{ steps.detect.outputs.fragment }}
      current-version: ${{ steps.version.outputs.current }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.deploy-key }}

      - name: Determine the version bump level from news fragments
        id: detect
        run: |
          frag_dir="${{ inputs.fragment-directory }}"

          shopt -s nullglob
          fragments=("$frag_dir"/*.breaking "$frag_dir"/*.feature "$frag_dir"/*.fix)
          shopt -u nullglob

          if [ ${#fragments[@]} -eq 0 ]; then
            echo "No news fragments found. Nothing to release."
            exit 0
          fi

          fragment="bug"
          for f in "${fragments[@]}"; do
            case "${f##*.}" in
              breaking) fragment="major"; break ;;
              feature) [ "$fragment" = "bug" ] && fragment="feature" ;;
            esac
          done
          echo "fragment=$fragment" >> "$GITHUB_OUTPUT"

      - name: Read the current version
        if: steps.detect.outputs.fragment != ''
        id: version
        run: |
          source="${{ inputs.version-source }}"

          case "$source" in
            package-xml)
              current=$(find . -name package.xml -type f -exec \
                sed -n 's/.*<version>\(.*\)<\/version>.*/\1/p' {} + \
                | sort -V | tail -1)
              ;;
            package-json)
              current=$(find . -name package.json -not -path '*/node_modules/*' -type f -exec \
                python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['version'])" {} \; \
                | sort -V | tail -1)
              ;;
            pyproject-toml)
              current=$(find . -name pyproject.toml -type f -exec \
                python3 -c "
          import tomllib, sys
          with open(sys.argv[1], 'rb') as f:
              data = tomllib.load(f)
          v = data.get('project', {}).get('version', '')
          if v: print(v)
          " {} \; | sort -V | tail -1)
              ;;
            *)
              echo "::error::Unknown version-source '$source'"
              exit 1
              ;;
          esac

          echo "current=$current" >> "$GITHUB_OUTPUT"

  # ── Release ──────────────────────────────────────────────────────
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.fragment != ''
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.deploy-key }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Configure git identity for the release commit
        uses: fregante/setup-git-user@v2

      - name: Install towncrier
        run: pip install towncrier

      - name: Calculate the next version
        id: bump
        uses: christian-draeger/increment-semantic-version@1.2.3
        with:
          current-version: ${{ needs.detect.outputs.current-version }}
          version-fragment: ${{ needs.detect.outputs.fragment }}

      - name: Compile news fragments into the changelog
        run: towncrier build --version "${{ steps.bump.outputs.next-version }}" --yes

      - name: Write the new version into every manifest
        run: |
          next="${{ steps.bump.outputs.next-version }}"
          source="${{ inputs.version-source }}"

          case "$source" in
            package-xml)
              find . -name package.xml -type f -exec \
                sed -i "s|<version>.*</version>|<version>${next}</version>|" {} +
              ;;
            package-json)
              find . -name package.json -not -path '*/node_modules/*' -type f -exec \
                python3 -c "
          import json, sys
          path = sys.argv[1]
          with open(path) as f: data = json.load(f)
          data['version'] = sys.argv[2]
          with open(path, 'w') as f: json.dump(data, f, indent=2)
          " {} "$next" \;
              ;;
            pyproject-toml)
              find . -name pyproject.toml -type f -exec \
                sed -i "s|^version = \".*\"|version = \"${next}\"|" {} +
              ;;
          esac

      - name: Commit, tag, and push the release
        run: |
          git add --all
          git commit -m "Release ${{ steps.bump.outputs.next-version }}"
          git tag "${{ steps.bump.outputs.next-version }}"
          git push origin main "${{ steps.bump.outputs.next-version }}"
