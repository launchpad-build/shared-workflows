name: Require news fragment on pull request

on:
  workflow_call:
    inputs:
      exclude-patterns:
        description: >
          Extended regex of file paths exempt from the fragment requirement.
          Matched against each line of git diff --name-only output.
        type: string
        required: false
        default: '^(newsfragments/|\.github/|CHANGELOG\.md$|towncrier\.toml$)'
      python-version:
        description: Python version used to run towncrier
        type: string
        required: false
        default: "3.12"
      fragment-directory:
        description: Directory containing news fragments
        type: string
        required: false
        default: newsfragments

jobs:
  require-news-fragment:
    name: Require news fragment for source changes
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject unsupported files in the fragment directory
        run: |
          frag_dir="${{ inputs.fragment-directory }}"
          if [ ! -d "$frag_dir" ]; then
            exit 0
          fi

          unsupported=$(find "$frag_dir" -mindepth 1 -maxdepth 1 -type f \
            ! -name '.gitkeep' \
            ! -name '*.breaking' ! -name '*.breaking.md' \
            ! -name '*.feature' ! -name '*.feature.md' \
            ! -name '*.fix'     ! -name '*.fix.md')

          if [ -n "$unsupported" ]; then
            echo "::error::Unsupported files in $frag_dir:"
            echo "$unsupported"
            echo "Allowed names: .gitkeep, or <id>.{breaking,feature,fix} with an optional .md suffix."
            exit 1
          fi

      - name: Check whether source files changed
        id: changes
        run: |
          has_source=$(git diff --name-only origin/main...HEAD \
            | grep -qvE '${{ inputs.exclude-patterns }}' \
            && echo true || echo false)
          echo "source=$has_source" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.changes.outputs.source == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Validate that a news fragment exists
        if: steps.changes.outputs.source == 'true'
        run: |
          pip install towncrier
          towncrier check --compare-with origin/main
